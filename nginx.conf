events { worker_connections 1024; }

http {
    upstream api_servers {
        server api:8080; 
    }

    server {
        listen 80;

        location /api/ {
            # Docker se encarga de repartir el tráfico entre las 3 réplicas 
            proxy_pass http://api:8080; 
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /swagger/ {
            proxy_pass http://api_servers/swagger/;
        }

        location /search/ {
            proxy_pass http://api_servers/search/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}