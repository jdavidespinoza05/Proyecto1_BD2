name: Pipeline CI/CD Restaurante

# ¿Cuándo se ejecuta? Cada vez que hagan un push a la rama principal (main)
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # TRABAJO 1: Ejecutar Pruebas (Unitarias y de Integración)
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: Configurar .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x' # La versión que usa la API de David

      - name: Restaurar dependencias
        run: dotnet restore ./RestauranteApi/RestauranteApi.csproj

      - name: Compilar el proyecto
        run: dotnet build ./RestauranteApi/RestauranteApi.csproj --no-restore

      # OJO AQUÍ: Si David creó un proyecto de pruebas, hay que apuntar a ese archivo .csproj
      - name: Ejecutar Pruebas
        run: dotnet test --no-build --verbosity normal

  # TRABAJO 2: Construir la imagen Docker y subirla al Registry de GitHub
  docker-publish:
    needs: build-and-test # Solo se ejecuta si las pruebas pasaron en verde
    runs-on: ubuntu-latest
    
    # Permisos necesarios para escribir en el GitHub Container Registry
    permissions:
      contents: read
      packages: write

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Iniciar sesión en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # Esto lo pone GitHub automáticamente, ¡no hay que configurar nada!

      - name: Construir y subir imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: ./RestauranteApi
          push: true
          # El nombre de la imagen será algo como: ghcr.io/su-usuario/proyecto1_bd2/api-restaurante:latest
          tags: ghcr.io/${{ github.repository }}/api-restaurante:latest