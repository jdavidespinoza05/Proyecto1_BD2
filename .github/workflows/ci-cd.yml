# Este archivo define el pipeline de integración y despliegue continuo del
# sistema de restaurantes utilizando GitHub Actions.
#
# Su función principal es automatizar el proceso de verificación del proyecto
# cada vez que se realiza un push o un pull request hacia las ramas main o master.
# De esta forma, se valida que el código compile correctamente, que las pruebas
# unitarias pasen y que la infraestructura principal pueda levantarse con Docker.
#
# El pipeline se divide en dos trabajos principales. El primero se encarga de
# descargar el código, configurar .NET 9, restaurar dependencias, compilar el
# proyecto y ejecutar las pruebas unitarias. Después, levanta los contenedores
# definidos en Docker Compose para realizar una prueba de integración sencilla,
# verificando que la API responda correctamente a través de Nginx.
#
# El segundo trabajo se ejecuta únicamente si el primero finaliza correctamente.
# Su objetivo es construir la imagen Docker de la API y publicarla en GitHub
# Container Registry. Para evitar errores con nombres en mayúsculas, primero se
# convierte el nombre del repositorio a minúsculas antes de generar la etiqueta
# de la imagen.
#
# En conjunto, este archivo ayuda a asegurar que el sistema mantenga una base
# estable, automatizando validaciones importantes antes de publicar una nueva
# versión de la aplicación.

name: Pipeline CI/CD Restaurante

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # TRABAJO 1: Verificación Total (Compilación + Pruebas)
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: Configurar .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restaurar dependencias
        run: dotnet restore ./RestauranteApi/RestauranteApi.csproj

      - name: Compilar el proyecto
        run: dotnet build ./RestauranteApi/RestauranteApi.csproj --no-restore

      - name: Ejecutar Pruebas Unitarias
        run: dotnet test ./RestauranteApi.Tests/RestauranteApi.Tests.csproj --verbosity normal

      # --- INICIO PRUEBAS DE INTEGRACIÓN ---
      - name: Levantar Infraestructura (Docker Compose)
        run: |
          docker compose up -d
          sleep 30 

      - name: Prueba de Integración - Conectividad API
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/api/restaurants)
          if [ $STATUS -ne 200 ]; then
            echo "Error: La API o Nginx no responden (Status: $STATUS)"
            exit 1
          fi
          echo "Integración exitosa"

      - name: Apagar contenedores de prueba
        if: always() 
        run: docker compose down
      # --- FIN PRUEBAS DE INTEGRACIÓN ---

  # TRABAJO 2: Construir y Publicar Imagen
  docker-publish:
    needs: build-and-test # Solo si el Trabajo 1 pasa en verde
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      # SOLUCIÓN: Convertir el nombre del repo a minúsculas para el Registry
      - name: Configurar nombre del repo en minúsculas
        run: |
          echo "REPO_LOWERCASE=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Iniciar sesión en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construir y subir imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: ./RestauranteApi
          push: true
          # Usamos la variable REPO_LOWERCASE para evitar el error de mayúsculas
          tags: ghcr.io/${{ env.REPO_LOWERCASE }}/api-restaurante:latest